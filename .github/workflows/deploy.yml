# Deploy to GitHub Pages workflow
# Last updated: 2024-03-19
name: Deploy to GitHub Pages

# Workflow to build and deploy the application to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        id: install
        run: |
          echo "Installing dependencies..."
          npm ci
          if [ $? -ne 0 ]; then
            echo "::error::Failed to install dependencies"
            exit 1
          fi
          echo "Dependencies installed successfully"
          npm list --depth=0

      - name: Debug Environment
        id: debug-env
        run: |
          echo "=== Environment Variables Check ==="
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "::error::VITE_SUPABASE_URL is missing"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY is missing"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "::error::VITE_SUPABASE_SERVICE_ROLE_KEY is missing"
            exit 1
          fi
          echo "All required environment variables are present"

      - name: Build
        id: build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting build process..."
          npm run build
          if [ $? -ne 0 ]; then
            echo "::error::Build failed"
            exit 1
          fi
          echo "Build completed successfully"
          echo "=== Build Output Contents ==="
          ls -la dist/
          if [ ! -f "dist/index.html" ]; then
            echo "::error::index.html not found in build output"
            exit 1
          fi
          echo "Build artifacts verified"

      - name: Deploy
        id: deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true

      - name: Verify Deployment
        id: verify
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30  # Give GitHub Pages time to process
          echo "Checking deployment status..."
          curl -s -o /dev/null -w "%{http_code}" https://ajinkya-builds.github.io/elephant-watch-app/ > status.txt
          STATUS=$(cat status.txt)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Deployment verification failed. Status code: $STATUS"
            exit 1
          fi
          echo "Deployment verified successfully" 